services:
  ababil_web_dev:
    image: node:20-alpine
    container_name: ababil_web_dev
    working_dir: /app
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
